<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Digital Diary</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
body{background:#f1f5f9}
.hidden{display:none}

/* Login */
#loginPage{
height:100vh;display:flex;justify-content:center;align-items:center;
background:linear-gradient(135deg,#2563eb,#06b6d4)
}
.loginBox{
background:#fff;padding:40px;border-radius:15px;width:320px;text-align:center
}
input,textarea,select{
width:100%;padding:10px;margin:8px 0;border-radius:6px;border:1px solid #ccc
}
button{padding:10px 15px;border:none;border-radius:6px;background:#2563eb;color:#fff;cursor:pointer}
button:hover{background:#1d4ed8}

/* Layout */
.app{display:flex;height:100vh}
.sidebar{width:230px;background:#1e293b;color:#fff;padding:20px}
.sidebar h2{margin-bottom:15px}
.sidebar button{width:100%;margin:6px 0;background:#334155}
.main{flex:1;display:flex;flex-direction:column}
.topbar{background:#fff;padding:15px;font-size:22px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.content{padding:20px;overflow:auto}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,.08);margin-bottom:20px}

table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:8px}
th{background:#e2e8f0}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}
.stat{background:#2563eb;color:#fff;padding:20px;border-radius:12px;text-align:center;font-size:20px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<div class="loginBox">
<h2>Teacher Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- APP -->
<div id="app" class="app hidden">
<div class="sidebar">
<h2>📘 Diary</h2>
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('students')">Students</button>
<button onclick="showPage('attendance')">Attendance</button>
<button onclick="showPage('lessons')">Lesson Plan</button>
<button onclick="showPage('notes')">Daily Notes</button>
<button onclick="showPage('calendar')">Calendar</button>
<button onclick="showPage('timetable')">Timetable</button>
<button onclick="printData()">Export / Print</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">
<div class="topbar">Teacher Digital Diary</div>
<div class="content">

<!-- DASHBOARD -->
<div id="dashboard" class="page card">
<h2>Dashboard</h2>
<div class="stats">
<div class="stat" id="sStudents">0 Students</div>
<div class="stat" id="sLessons">0 Lessons</div>
<div class="stat" id="sNotes">0 Notes</div>
<div class="stat" id="sEvents">0 Events</div>
</div>
</div>

<!-- STUDENTS -->
<div id="students" class="page hidden card">
<h2>Student Manager</h2>
<input id="stuName" placeholder="Student Name">
<input id="stuClass" placeholder="Class">
<button onclick="addStudent()">Add Student</button>
<div id="studentList"></div>
</div>

<!-- ATTENDANCE -->
<div id="attendance" class="page hidden card">
<h2>Attendance</h2>
<input type="date" id="attDate">
<div id="attendanceList"></div>
<button onclick="saveAttendance()">Save Attendance</button>
</div>

<!-- LESSON -->
<div id="lessons" class="page hidden card">
<h2>Lesson Planner</h2>
<input id="lessonTopic" placeholder="Topic">
<textarea id="lessonDetail" placeholder="Details"></textarea>
<button onclick="saveLesson()">Save Lesson</button>
<div id="lessonList"></div>
</div>

<!-- NOTES -->
<div id="notes" class="page hidden card">
<h2>Daily Teaching Notes</h2>
<input type="date" id="noteDate">
<textarea id="noteText"></textarea>
<button onclick="saveNote()">Save Note</button>
<div id="noteList"></div>
</div>

<!-- CALENDAR -->
<div id="calendar" class="page hidden card">
<h2>Academic Calendar</h2>
<input id="eventName" placeholder="Event Name">
<input type="date" id="eventDate">
<button onclick="saveEvent()">Add Event</button>
<div id="eventList"></div>
</div>

<!-- TIMETABLE -->
<div id="timetable" class="page hidden card">
<h2>Timetable</h2>
<input id="day" placeholder="Day">
<input id="subject" placeholder="Subject">
<input id="time" placeholder="Time">
<button onclick="saveTime()">Add</button>
<div id="timeList"></div>
</div>

</div>
</div>
</div>

<script>
const get=(k)=>JSON.parse(localStorage.getItem(k)||"[]")
const set=(k,v)=>localStorage.setItem(k,JSON.stringify(v))

function login(){
if(user.value && pass.value){
loginPage.classList.add("hidden")
app.classList.remove("hidden")
updateDashboard()
loadAll()
}
}
function logout(){location.reload()}

function showPage(p){
document.querySelectorAll(".page").forEach(x=>x.classList.add("hidden"))
document.getElementById(p).classList.remove("hidden")
}

function addStudent(){
let s=get("students"); s.push({name:stuName.value,cls:stuClass.value}); set("students",s); loadStudents(); updateDashboard()
}
function loadStudents(){
let s=get("students")
studentList.innerHTML="<table><tr><th>Name</th><th>Class</th></tr>"+s.map(x=>`<tr><td>${x.name}</td><td>${x.cls}</td></tr>`).join("")+"</table>"
attendanceList.innerHTML=s.map((x,i)=>`${x.name} <input type="checkbox" id="a${i}"><br>`).join("")
}

function saveAttendance(){
let s=get("students")
let att=s.map((x,i)=>({name:x.name,present:document.getElementById("a"+i).checked}))
let all=get("attendance"); all.push({date:attDate.value,data:att}); set("attendance",all); alert("Saved")
}

function saveLesson(){let l=get("lessons"); l.push({t:lessonTopic.value,d:lessonDetail.value}); set("lessons",l); loadLessons(); updateDashboard()}
function loadLessons(){let l=get("lessons"); lessonList.innerHTML=l.map(x=>`<p><b>${x.t}</b> - ${x.d}</p>`).join("")}

function saveNote(){let n=get("notes"); n.push({d:noteDate.value,t:noteText.value}); set("notes",n); loadNotes(); updateDashboard()}
function loadNotes(){let n=get("notes"); noteList.innerHTML=n.map(x=>`<p>${x.d} : ${x.t}</p>`).join("")}

function saveEvent(){let e=get("events"); e.push({n:eventName.value,d:eventDate.value}); set("events",e); loadEvents(); updateDashboard()}
function loadEvents(){let e=get("events"); eventList.innerHTML=e.map(x=>`<p>${x.n} - ${x.d}</p>`).join("")}

function saveTime(){let t=get("time"); t.push({d:day.value,s:subject.value,t:time.value}); set("time",t); loadTime()}
function loadTime(){let t=get("time"); timeList.innerHTML=t.map(x=>`<p>${x.d} ${x.t} : ${x.s}</p>`).join("")}

function updateDashboard(){
sStudents.innerText=get("students").length+" Students"
sLessons.innerText=get("lessons").length+" Lessons"
sNotes.innerText=get("notes").length+" Notes"
sEvents.innerText=get("events").length+" Events"
}

function loadAll(){loadStudents();loadLessons();loadNotes();loadEvents();loadTime()}
function printData(){window.print()}
</script>

</body>
</html>
